<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFD Store | Own Business</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <header class="store-header">
    <div class="logo">
      <img src="https://i.postimg.cc/G3Qjxkmt/20250410-212750-(1).png" alt="MFD Store Logo">
      <h1>MFD Store Own Business</h1>
    </div>
    <nav class="auth-nav">
      <button onclick="openModal('login-modal')">🔑 Login</button>
      <button onclick="openModal('register-modal')">📝 Register</button>
    </nav>
  </header>

  <main class="store-catalog">
    <div class="catalog-tabs">
      <button class="tab active" data-tab="trending">🔥 Trending</button>
      <button class="tab" data-tab="sales">💰 Highest Sales</button>
      <button class="tab" data-tab="event">🎉 Event Based</button>
    </div>

    <section class="recommendations">
      <h2>Recommendations For You</h2>
      <p>Exclusive deals updated in real-time!</p>
    </section>

    <div class="ad-banner">Advertisement</div>
    <div class="product-grid" id="product-grid">
      <p class="loading">Memuatkan katalog...</p>
    </div>
  </main>

  <!-- Modals -->
  <div id="login-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Login Account</h2>
      <button class="primary">LOGIN NOW</button>
      <p>ATAU</p>
      <button class="social"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Continue with Google</button>
      <p class="switch">New here? <a href="#" onclick="openModal('register-modal')">Register Account</a></p>
      <button class="close" onclick="closeModal('login-modal')">×</button>
    </div>
  </div>

  <div id="register-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Register Account</h2>
      <button class="primary">REGISTER FREE</button>
      <p>ATAU</p>
      <button class="social"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Sign up with Google</button>
      <p class="switch">Have account? <a href="#" onclick="openModal('login-modal')">Login Here</a></p>
      <button class="close" onclick="closeModal('register-modal')">×</button>
    </div>
  </div>

  <footer class="store-footer">
    <button class="whatsapp-fab">
      <img src="https://i.postimg.cc/Bvb6HRzm/whatsapp-logo-3d-render-free-png.png" alt="WA"> Chat Now
    </button>
  </footer>

  <script src="assets/js/app.js"></script>
  <script type="module">
  // Import Firebase & Logic
  import { observeAuthState, logoutUser } from './assets/js/auth.js';
  import { subscribePublicProducts } from './assets/js/crud-products.js';
  import { formatMYR, getStatusClass } from './assets/js/utils.js';
  
  // 🎯 Initialize App
  document.addEventListener('DOMContentLoaded', () => {
    // Auth Observer
    observeAuthState(({ user, role, profile }) => {
      const authNav = document.querySelector('.auth-nav');
      if (user) {
        authNav.innerHTML = `
          <span class="user-greeting">Hi, ${profile?.username || profile?.businessName} 👋</span>
          <a href="/${role}/dashboard.html" class="btn-primary">Dashboard</a>
          <button onclick="handleLogout()" class="btn-outline">Logout</button>
        `;
      } else {
        authNav.innerHTML = `
          <button onclick="openModal('login-modal')" class="btn-outline">🔑 Login</button>
          <button onclick="openModal('register-modal')" class="btn-primary">📝 Register</button>
        `;
      }
    });
    
    // Load Products (Real-time)
    subscribePublicProducts({}, (products) => {
      const grid = document.getElementById('product-grid');
      if (products.length === 0) {
        grid.innerHTML = '<p class="empty-state">Tiada produk tersedia buat masa ini.</p>';
        return;
      }
      
      grid.innerHTML = products.map(p => `
        <article class="product-card" data-id="${p.id}">
          <div class="product-image">
            <img src="${p.image || 'https://via.placeholder.com/200'}" alt="${p.name}" loading="lazy">
            ${p.eventTags?.map(tag => `<span class="event-badge">${tag}</span>`).join('') || ''}
          </div>
          <div class="product-info">
            <h3>${p.name}</h3>
            <p class="price">${formatMYR(p.price)}</p>
            <div class="product-meta">
              <span class="rating">⭐ ${p.rating?.toFixed(1) || 'New'}</span>
              <span class="sold">🛒 ${p.sold || 0} sold</span>
            </div>
            <button class="btn-primary" onclick="addToCart('${p.id}')">Add to Cart</button>
          </div>
        </article>
      `).join('');
    });
    
    // Tab Filtering
    document.querySelectorAll('.catalog-tabs .tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        document.querySelectorAll('.catalog-tabs .tab').forEach(t => t.classList.remove('active'));
        e.currentTarget.classList.add('active');
        
        const filter = e.currentTarget.dataset.tab;
        subscribePublicProducts(
          filter === 'event' ? { eventTag: 'Trending' } : {},
          (products) => { /* re-render logic */ }
        );
      });
    });
  });
  
  // 🌐 Global Functions for HTML onclick
  window.handleLogout = async () => {
    const result = await logoutUser();
    if (result.success) window.location.reload();
  };
  
  window.addToCart = (productId) => {
    // Implement cart logic or redirect to checkout
    alert('✅ Added to cart! (Demo)');
  };
</script>
  <script type="module">
  import { db } from './assets/js/firebase-config.js';
  import { getDocs, collection } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  
  // Test connection
  getDocs(collection(db, "products"))
    .then(snapshot => {
      console.log('✅ Firebase connected! Products:', snapshot.size);
      document.getElementById('product-grid').innerHTML = 
        `<p style="color:#10b981">✅ Connected! ${snapshot.size} products loaded</p>`;
    })
    .catch(err => {
      console.error('❌ Firebase error:', err);
      document.getElementById('product-grid').innerHTML = 
        `<p style="color:#ef4444">❌ Error: ${err.message}</p>`;
    });
</script>
</body>
</html>
