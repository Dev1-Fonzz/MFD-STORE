<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFD Store | Own Business</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <header class="store-header">
    <div class="logo">
      <img src="https://i.postimg.cc/G3Qjxkmt/20250410-212750-(1).png" alt="MFD Store Logo">
      <h1>MFD Store Own Business</h1>
    </div>
    <nav class="auth-nav">
      <button onclick="openModal('login-modal')">🔑 Login</button>
      <button onclick="openModal('register-modal')">📝 Register</button>
    </nav>
  </header>

  <main class="store-catalog">
    <div class="catalog-tabs">
      <button class="tab active" data-tab="trending">🔥 Trending</button>
      <button class="tab" data-tab="sales">💰 Highest Sales</button>
      <button class="tab" data-tab="event">🎉 Event Based</button>
    </div>

    <section class="recommendations">
      <h2>Recommendations For You</h2>
      <p>Exclusive deals updated in real-time!</p>
    </section>

    <div class="ad-banner">Advertisement</div>
    <div class="product-grid" id="product-grid">
      <p class="loading">Memuatkan katalog...</p>
    </div>
  </main>

  <!-- Modals -->
  <div id="login-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Login Account</h2>
      <button class="primary">LOGIN NOW</button>
      <p>ATAU</p>
      <button class="social"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Continue with Google</button>
      <p class="switch">New here? <a href="#" onclick="openModal('register-modal')">Register Account</a></p>
      <button class="close" onclick="closeModal('login-modal')">×</button>
    </div>
  </div>

  <div id="register-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Register Account</h2>
      <button class="primary">REGISTER FREE</button>
      <p>ATAU</p>
      <button class="social"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Sign up with Google</button>
      <p class="switch">Have account? <a href="#" onclick="openModal('login-modal')">Login Here</a></p>
      <button class="close" onclick="closeModal('register-modal')">×</button>
    </div>
  </div>

  <footer class="store-footer">
    <button class="whatsapp-fab">
      <img src="https://i.postimg.cc/Bvb6HRzm/whatsapp-logo-3d-render-free-png.png" alt="WA"> Chat Now
    </button>
  </footer>

  <script src="assets/js/app.js"></script>
<!-- Firebase SDK (Direct CDN - No module import issues) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  // 🔥 Firebase Config - GANTI DENGAN CONFIG ANDA
  const firebaseConfig = {
            apiKey: "AIzaSyDMrexlgTwauuqmZ2kZECwqqEYmwtj7Zrs",
            authDomain: "mfd-store.firebaseapp.com",
            projectId: "mfd-store",
            storageBucket: "mfd-store.firebasestorage.app",
            messagingSenderId: "1039564529069",            appId: "1:1039564529069:web:bc7c752f3618e6cb879524"
        };
        
  // Initialize Firebase (Compat version - more reliable for vanilla JS)
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();
  
  // 🎨 Helper: Format Currency
  const formatMYR = (amount) =>
    new Intl.NumberFormat('ms-MY', { style: 'currency', currency: 'MYR' }).format(amount);
  
  // 🎨 Helper: Status Badge
  const getStatusBadge = (status) => {
    const colors = { 'Public': 'active', 'Private': 'warning', 'Deleted': 'danger' };
    return `<span class="badge ${colors[status] || 'secondary'}">${status}</span>`;
  };
  
  // 🔄 Render Products to DOM
  const renderProducts = (products) => {
    const grid = document.getElementById('product-grid');
    if (!grid) {
      console.error('❌ Element #product-grid not found!');
      return;
    }
    
    if (!products || products.length === 0) {
      grid.innerHTML = '<p class="empty-state">Tiada produk tersedia.</p>';
      return;
    }
    
    grid.innerHTML = products.map(p => {
      const data = p.data ? p.data() : p; // Handle both DocumentSnapshot & plain object
      return `
        <article class="product-card" data-id="${p.id || data.id}">          <div class="product-image">
            <img src="${data.image || 'https://via.placeholder.com/200'}" 
                 alt="${data.name}" 
                 loading="lazy"
                 onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
            ${data.eventTags ? `<span class="event-badge">${data.eventTags[0]}</span>` : ''}
          </div>
          <div class="product-info">
            <h3>${data.name || 'Unknown Product'}</h3>
            <p class="price">${formatMYR(data.price)}</p>
            <div class="product-meta">
              <span class="rating">⭐ ${data.rating?.toFixed(1) || 'New'}</span>
              <span class="sold">🛒 ${data.sold || 0} sold</span>
            </div>
            <button class="btn-primary" onclick="addToCart('${p.id || data.id}')">
              Add to Cart
            </button>
          </div>
        </article>
      `;
    }).join('');
    
    console.log(`✅ Rendered ${products.length} products`);
  };
  
  // 🚀 Load Products on Page Load
  document.addEventListener('DOMContentLoaded', () => {
    console.log('🔍 Loading products...');
    
    // Simple getDocs (no complex query for testing)
    db.collection('products')
      .where('status', '==', 'Public')
      .orderBy('createdAt', 'desc')
      .limit(20)
      .get()
      .then(snapshot => {
        console.log(`✅ Loaded ${snapshot.size} products`);
        const products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderProducts(products);
      })
      .catch(error => {
        console.error('❌ Error loading products:', error);
        document.getElementById('product-grid').innerHTML =
          `<p style="color:#ef4444">Error: ${error.message}</p>`;
      });
    
    // 🔄 Real-time listener (optional - for live updates)
    // db.collection('products').where('status', '==', 'Public')
    //   .onSnapshot(snapshot => {
    //     const products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));    //     renderProducts(products);
    //   });
  });
  
  // 🛒 Dummy Cart Function
  window.addToCart = (productId) => {
    alert('✅ Added to cart! (Demo)');
    // Implement cart logic here later
  };
  
  // 🔐 Auth UI Toggle (Simple)
  auth.onAuthStateChanged(user => {
    const authNav = document.querySelector('.auth-nav');
    if (user && authNav) {
      authNav.innerHTML = `
        <span style="margin-right:1rem">Hi, ${user.displayName || user.email}</span>
        <a href="/customer/dashboard.html" class="btn-primary">Dashboard</a>
        <button onclick="firebase.auth().signOut()" class="btn-outline">Logout</button>
      `;
    }
  });
</script>
</body>
</html>
